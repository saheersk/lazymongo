version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: lazymongo
    main: .
    binary: lazymongo
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: saheersk
    name: lazymongo
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"

brews:
  - name: lazymongo
    repository:
      owner: saheersk
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/saheersk/lazymongo"
    description: "A fast, keyboard-driven terminal UI for MongoDB"
    license: "MIT"
    install: |
      bin.install "lazymongo"
    test: |
      system "#{bin}/lazymongo", "--help"
